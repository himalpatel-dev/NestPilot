# Auto-deploys the backend to the Linux server on every push to main that
# touches NestPilot-backend/. Requires these GitHub repo secrets
# (Settings → Secrets and variables → Actions):
#   SERVER_HOST     - server IP or domain
#   SERVER_USER     - SSH user (e.g. ubuntu, root)
#   SERVER_SSH_KEY  - private key whose public half is in the server's
#                     ~/.ssh/authorized_keys
#   DEPLOY_PATH     - path of the cloned repo on the server (e.g. /var/www/NestPilot)
name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'NestPilot-backend/**'
      - '.github/workflows/deploy-backend.yml'
  # Allows manual deploys from the GitHub Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and restart on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            # Load nvm (npm/pm2 aren't on PATH in non-interactive SSH sessions)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            cd NestPilot-backend
            npm ci --omit=dev
            pm2 restart nestpilot-api || pm2 start src/server.js --name nestpilot-api
            pm2 save
